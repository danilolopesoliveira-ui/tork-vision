<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F4C75" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0A2F4A" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="irisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF8C5A"/>
    </linearGradient>
  </defs>

  <!-- === ICON: Eye with target === -->

  <!-- Eye glow background -->
  <ellipse cx="36" cy="40" rx="28" ry="18" fill="url(#bgGrad)"/>

  <!-- Eye outer shape -->
  <path d="M8,40 C16,22 56,22 64,40 C56,58 16,58 8,40 Z"
        fill="none" stroke="#2D6A9F" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Iris ring -->
  <circle cx="36" cy="40" r="12" fill="none" stroke="#FF6B35" stroke-width="1.6"/>

  <!-- Pupil (filled orange) -->
  <circle cx="36" cy="40" r="5.5" fill="url(#irisGrad)"/>

  <!-- Highlight -->
  <circle cx="39" cy="37" r="2" fill="white" opacity="0.4"/>

  <!-- Corner data dots (competitive intelligence cue) -->
  <circle cx="19" cy="33" r="1.8" fill="#8AA8C0" opacity="0.7"/>
  <circle cx="53" cy="33" r="1.8" fill="#8AA8C0" opacity="0.7"/>
  <circle cx="19" cy="47" r="1.8" fill="#8AA8C0" opacity="0.7"/>
  <circle cx="53" cy="47" r="1.8" fill="#8AA8C0" opacity="0.7"/>

  <!-- === WORDMARK === -->

  <!-- "TORK" in white -->
  <text x="80" y="48"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="900"
        letter-spacing="-0.5"
        fill="#E8F4F8">TORK</text>

  <!-- "VISION" in orange -->
  <text x="152" y="48"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="900"
        letter-spacing="-0.5"
        fill="#FF6B35"> VISION</text>

  <!-- Orange accent line under VISION -->
  <rect x="152" y="52" width="130" height="2.5" rx="1.5" fill="#FF6B35" opacity="0.5"/>

  <!-- === TAGLINE === -->
  <text x="80" y="67"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="8.5" font-weight="500"
        letter-spacing="2.8"
        fill="#8AA8C0">INTELIGÊNCIA COMPETITIVA</text>
</svg>
